services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: tradealert
      POSTGRES_USER: tradealert
      POSTGRES_PASSWORD: tradealert
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tradealert -d tradealert"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      TRADEALERT_DATABASE_URL: postgresql+psycopg://tradealert:tradealert@postgres:5432/tradealert
      TRADEALERT_REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build:
      context: ./services/api
    env_file:
      - .env
    environment:
      TRADEALERT_DATABASE_URL: postgresql+psycopg://tradealert:tradealert@postgres:5432/tradealert
      TRADEALERT_REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m app.worker

volumes:
  postgres-data:

